<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoLine - Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --apple-blue: #4F8CFF;
            --apple-violet: #7A5CFF;
            --apple-cyan: #64D2FF;
            --apple-pink: #FF6482;
            --apple-green: #30D158;
            --apple-red: #FF453A;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh; margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 720px; }

        .nav-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 50px; }
        h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -1px; }

        .btn-text { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 500; transition: color 0.2s; font-family: 'Inter'; }
        .btn-text:hover { color: white; }

        .section-label {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px;
        }

        .list-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        /* === Liquid Glass Cards === */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 28px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .glass-card::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(79,140,255,0.06), transparent 55%),
                radial-gradient(ellipse at 80% 100%, rgba(122,92,255,0.04), transparent 55%);
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.14);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .btn {
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-violet));
            color: white; font-weight: 600; font-family: 'Inter'; font-size: 15px;
            padding: 14px 20px; border: none; border-radius: 14px; cursor: pointer;
            width: 100%; margin-top: 22px;
            box-shadow: 0 4px 18px rgba(79,140,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(122,92,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled {
            background: rgba(255,255,255,0.04); color: var(--text-muted); cursor: not-allowed;
            transform: none; border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        /* === Modal === */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal {
            background: rgba(12,12,14,0.95);
            border: 1px solid var(--glass-border);
            width: 92%; max-width: 420px;
            max-height: 90vh;
            border-radius: 28px; padding: 0;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .modal::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse at 30% -10%, rgba(122,92,255,0.12), transparent 50%),
                radial-gradient(ellipse at 70% 110%, rgba(79,140,255,0.08), transparent 50%);
        }

        .modal-body {
            padding: 36px 30px 30px;
            overflow-y: auto; flex: 1;
            position: relative; z-index: 1;
        }

        .modal-footer {
            padding: 0 30px 30px;
            position: relative; z-index: 1;
            display: flex; gap: 12px;
            flex-shrink: 0;
        }
        .modal-footer .btn { margin-top: 0; }
        .btn-outline {
            background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
            color: var(--text-main); box-shadow: none;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.08); box-shadow: none; transform: none; }

        /* === Captcha Canvas === */
        canvas#captcha-canvas {
            background: #06060a; border-radius: 14px; margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.06); width: 100%; height: 90px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.6);
        }
        .captcha-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 4px;
        }

        input#captcha-input {
            width: 100%; padding: 16px; box-sizing: border-box;
            background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
            color: white; border-radius: 14px; font-family: 'Inter'; font-size: 17px;
            text-align: center; letter-spacing: 8px; font-weight: 600;
            transition: border-color 0.2s, box-shadow 0.3s;
            margin-bottom: 12px;
        }
        input#captcha-input:focus {
            border-color: var(--apple-blue); outline: none;
            box-shadow: 0 0 0 3px rgba(79,140,255,0.12);
        }

        .error-msg { color: var(--apple-red); font-size: 13px; font-weight: 500; display: none; margin-bottom: 8px; }

        /* === QRNG Visualization === */
        .qrng-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s, padding 0.3s, margin 0.3s;
            padding: 0 20px; margin: 0 0 0 0;
        }
        .qrng-panel.expanded {
            max-height: 280px; opacity: 1;
            padding: 22px 20px; margin: 0 0 20px 0;
            overflow-y: auto;
        }
        .qrng-panel::-webkit-scrollbar { width: 4px; }
        .qrng-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .qrng-source-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .qrng-source-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 18px; }

        .qrng-flow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .qrng-node {
            background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 8px 0; font-size: 10px; color: var(--text-muted);
            font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
            text-align: center; width: 72px; position: relative;
            transition: all 0.4s;
        }
        .qrng-connector {
            flex: 1; height: 1px; background: rgba(255,255,255,0.06);
            position: relative; margin: 0 4px; overflow: hidden;
        }
        .qrng-dot {
            position: absolute; top: -2px; left: -6px;
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--apple-blue); box-shadow: 0 0 8px var(--apple-blue);
            opacity: 0;
        }

        .qrng-flow.running .qrng-node {
            color: white; border-color: rgba(79,140,255,0.5);
            box-shadow: 0 0 12px rgba(79,140,255,0.15);
            animation: nodePulse 2.5s ease-in-out infinite alternate;
        }
        .qrng-flow.running .qrng-dot { animation: dotTravel 1.8s linear infinite; }

        .qrng-flow.is-crypto .qrng-node {
            border-color: rgba(122,92,255,0.5);
            box-shadow: 0 0 12px rgba(122,92,255,0.15);
        }
        .qrng-flow.is-crypto .qrng-dot {
            background: var(--apple-violet);
            box-shadow: 0 0 8px var(--apple-violet);
        }

        @keyframes nodePulse {
            0% { box-shadow: 0 0 8px rgba(79,140,255,0.1); }
            100% { box-shadow: 0 0 20px rgba(79,140,255,0.3); }
        }
        @keyframes dotTravel {
            0% { left: -6px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        .qrng-output {
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
            padding: 10px 14px; border-radius: 10px;
            border: 1px solid rgba(79,140,255,0.15);
            background: rgba(79,140,255,0.04);
            color: var(--apple-blue);
            word-break: break-all;
        }

        .loader { width: 28px; height: 28px; border: 2px solid var(--glass-border); border-top-color: var(--apple-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <h1>NoLine</h1>
        <div style="display: flex; gap: 24px;">
            <button class="btn-text" onclick="window.location.href='my-queues.html'">Tracker</button>
            <button class="btn-text" onclick="window.logout()">Log off</button>
        </div>
    </div>

    <div class="section-label">Available Queues</div>
    <div id="available-queues" class="list-grid">
        <div class="loader"></div>
    </div>
</div>

<!-- ===== CAPTCHA MODAL ===== -->
<div class="modal-overlay" id="captcha-modal">
    <div class="modal">
        <div class="modal-body">
            <h2 style="margin: 0 0 4px; font-size: 22px; font-weight: 600;">Verify Identity</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 28px;">Enter the characters below to proceed.</p>

            <div id="captcha-loading" style="padding: 30px 0;">
                <div class="loader"></div>
            </div>

            <div id="captcha-content" style="display: none;">
                <canvas id="captcha-canvas" width="300" height="90"></canvas>
                <div class="captcha-controls">
                    <button class="btn-text" style="font-size: 12px; color: var(--apple-blue);" onclick="window.toggleQRNG()">How is this generated?</button>
                    <button class="btn-text" style="font-size: 12px;" onclick="window.regenerateCaptcha()">New Code</button>
                </div>

                <!-- QRNG Visualization — scrollable, never pushes buttons -->
                <div id="qrng-panel" class="qrng-panel">
                    <div class="qrng-source-label" id="qrng-label">Source</div>
                    <div class="qrng-source-desc" id="qrng-desc">Resolving entropy source…</div>
                    <div class="qrng-flow" id="qrng-flow">
                        <div class="qrng-node">Source</div>
                        <div class="qrng-connector"><div class="qrng-dot"></div></div>
                        <div class="qrng-node">Measure</div>
                        <div class="qrng-connector"><div class="qrng-dot"></div></div>
                        <div class="qrng-node">Output</div>
                        <div class="qrng-connector"><div class="qrng-dot"></div></div>
                        <div class="qrng-node" style="color:white;border-color:rgba(255,255,255,0.3);">CAPTCHA</div>
                    </div>
                    <div class="qrng-output" id="qrng-output">—</div>
                </div>

                <input type="text" id="captcha-input" placeholder="Enter code" maxlength="6" autocomplete="off">
                <div id="captcha-error" class="error-msg">Characters don't match. Try again.</div>
            </div>
        </div>

        <div class="modal-footer" id="modal-footer" style="display:none;">
            <button class="btn btn-outline" onclick="window.closeModal()">Cancel</button>
            <button class="btn" id="btn-submit-captcha" onclick="window.submitJoin()">Join Queue</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const cfg = { apiKey: "AIzaSyCVmB3rX1fqz7ctjVgHEIzwiiy8vF4L-MI", authDomain: "noline-20691.firebaseapp.com", projectId: "noline-20691" };
    const db = getFirestore(initializeApp(cfg));

    const myName = localStorage.getItem('noline_name');
    if (!myName) window.location.href = 'login.html';

    let activeQueueId = null, expectedCaptcha = null, activeQueueName = null;
    const getEl = id => document.getElementById(id);

    window.logout = () => { localStorage.removeItem('noline_name'); window.location.href = 'login.html'; };

    // ─────────────────────────────────────────────────
    //  QRNG ENGINE — Multi-proxy + Retry (ANU priority)
    // ─────────────────────────────────────────────────
    const PROXY_URLS = [
        len => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://qrng.anu.edu.au/API/jsonI.php?length=${len}&type=uint8`)}`,
        len => `https://api.allorigins.win/get?url=${encodeURIComponent(`https://qrng.anu.edu.au/API/jsonI.php?length=${len}&type=uint8`)}`,
    ];

    async function singleAttempt(url, timeout) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeout);
        try {
            const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
            clearTimeout(timer);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();

            // allorigins /get wraps in {contents: "..."}
            if (json.contents) {
                const inner = JSON.parse(json.contents);
                if (inner && inner.success && Array.isArray(inner.data)) return inner.data;
                throw new Error('Wrapped parse fail');
            }
            // allorigins /raw or direct
            if (json.success && Array.isArray(json.data)) return json.data;
            throw new Error('No data array');
        } catch (e) {
            clearTimeout(timer);
            throw e;
        }
    }

    async function resolveQRNG(count = 6) {
        // Strategy: try each proxy URL, each with 2 retries, 300ms gap between retries
        for (const makeUrl of PROXY_URLS) {
            const url = makeUrl(count) + `&_=${Date.now()}`;
            for (let attempt = 0; attempt < 3; attempt++) {
                try {
                    console.log(`[QRNG] Proxy attempt ${attempt + 1}, URL: ${url.substring(0, 60)}…`);
                    const data = await singleAttempt(url, 4000);
                    console.log(`[QRNG] ✓ Quantum success`, data);
                    return { raw: data.slice(0, count), source: 'quantum' };
                } catch (e) {
                    console.warn(`[QRNG] Attempt ${attempt + 1} failed:`, e.message);
                    if (attempt < 2) await new Promise(r => setTimeout(r, 300));
                }
            }
        }

        // Also try direct ANU (works if CORS allows, e.g. on Firebase Hosting)
        try {
            console.log('[QRNG] Trying direct ANU…');
            const data = await singleAttempt(`https://qrng.anu.edu.au/API/jsonI.php?length=${count}&type=uint8&_=${Date.now()}`, 3000);
            console.log('[QRNG] ✓ Direct ANU success', data);
            return { raw: data.slice(0, count), source: 'quantum' };
        } catch (e) {
            console.warn('[QRNG] Direct ANU failed:', e.message);
        }

        // Final fallback: crypto.getRandomValues
        console.log('[QRNG] → Falling back to crypto.getRandomValues');
        const arr = new Uint8Array(count);
        window.crypto.getRandomValues(arr);
        return { raw: Array.from(arr), source: 'crypto' };
    }

    // ─────────────────────────────────────────────────
    //  CAPTCHA RENDERER
    // ─────────────────────────────────────────────────
    function engraveCaptcha(text) {
        const c = getEl('captcha-canvas'); if (!c) return;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);

        // subtle noise
        for (let i = 0; i < 50; i++) {
            ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.random() * 0.04})`;
            ctx.fillRect(Math.random() * c.width, Math.random() * c.height, 1 + Math.random(), 1 + Math.random());
        }
        // distortion lines
        for (let i = 0; i < 3; i++) {
            ctx.strokeStyle = `rgba(255,255,255,${0.04 + Math.random() * 0.06})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(Math.random() * c.width, Math.random() * c.height);
            ctx.bezierCurveTo(
                Math.random() * c.width, Math.random() * c.height,
                Math.random() * c.width, Math.random() * c.height,
                Math.random() * c.width, Math.random() * c.height
            );
            ctx.stroke();
        }

        ctx.font = '600 34px "Inter"';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < text.length; i++) {
            const hue = 220 + i * 12;
            ctx.fillStyle = `hsla(${hue}, 70%, 78%, 0.9)`;
            ctx.save();
            ctx.translate(38 + i * 40, c.height / 2 + (Math.random() - 0.5) * 12);
            ctx.rotate((Math.random() - 0.5) * 0.18);
            ctx.fillText(text[i], 0, 0);
            ctx.restore();
        }
    }

    // ─────────────────────────────────────────────────
    //  QRNG PANEL TOGGLE & UPDATE
    // ─────────────────────────────────────────────────
    window.toggleQRNG = () => {
        const panel = getEl('qrng-panel');
        const flow = getEl('qrng-flow');
        if (!panel) return;
        if (panel.classList.contains('expanded')) {
            panel.classList.remove('expanded');
            if (flow) flow.classList.remove('running');
        } else {
            panel.classList.add('expanded');
            if (flow) flow.classList.add('running');
        }
    };

    function updateQRNGDisplay(data) {
        const lbl = getEl('qrng-label');
        const desc = getEl('qrng-desc');
        const out = getEl('qrng-output');
        const flow = getEl('qrng-flow');
        if (!lbl || !desc || !out || !flow) return;

        const isQ = data.source === 'quantum';
        lbl.textContent = isQ ? 'Quantum (ANU)' : 'Secure Random (Crypto)';
        lbl.style.color = isQ ? 'var(--apple-blue)' : 'var(--apple-violet)';
        desc.textContent = isQ
            ? 'Values captured from subatomic quantum vacuum fluctuations at ANU.'
            : 'Local cryptographic PRNG used as fallback entropy source.';
        out.textContent = `${isQ ? 'Quantum' : 'Secure'} Random Values: [${data.raw.join(', ')}]`;
        out.style.color = isQ ? 'var(--apple-blue)' : 'var(--apple-violet)';
        out.style.borderColor = isQ ? 'rgba(79,140,255,0.15)' : 'rgba(122,92,255,0.15)';
        out.style.background = isQ ? 'rgba(79,140,255,0.04)' : 'rgba(122,92,255,0.04)';

        flow.classList.remove('is-crypto');
        if (!isQ) flow.classList.add('is-crypto');
        if (getEl('qrng-panel')?.classList.contains('expanded')) flow.classList.add('running');
    }

    // ─────────────────────────────────────────────────
    //  CAPTCHA LIFECYCLE
    // ─────────────────────────────────────────────────
    window.regenerateCaptcha = async () => {
        const ld = getEl('captcha-loading');
        const ct = getEl('captcha-content');
        const ft = getEl('modal-footer');
        if (ld) ld.style.display = 'block';
        if (ct) ct.style.display = 'none';
        if (ft) ft.style.display = 'none';

        const data = await resolveQRNG(6);
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        expectedCaptcha = data.raw.map(n => chars[n % chars.length]).join('');
        engraveCaptcha(expectedCaptcha);
        updateQRNGDisplay(data);

        if (ld) ld.style.display = 'none';
        if (ct) ct.style.display = 'block';
        if (ft) ft.style.display = 'flex';
    };

    window.closeModal = () => {
        const m = getEl('captcha-modal'); if (m) m.classList.remove('active');
        const p = getEl('qrng-panel'); if (p) p.classList.remove('expanded');
        const f = getEl('qrng-flow'); if (f) f.classList.remove('running');
    };

    window.startJoinProcess = async (qId, qName) => {
        activeQueueId = qId; activeQueueName = qName;
        const m = getEl('captcha-modal'); if (m) m.classList.add('active');
        const err = getEl('captcha-error'); if (err) err.style.display = 'none';
        const inp = getEl('captcha-input'); if (inp) inp.value = '';
        const p = getEl('qrng-panel'); if (p) p.classList.remove('expanded');
        await window.regenerateCaptcha();
    };

    window.submitJoin = async () => {
        const inp = getEl('captcha-input'); if (!inp) return;
        const err = getEl('captcha-error');
        if (inp.value.trim() !== expectedCaptcha) { if (err) err.style.display = 'block'; return; }
        if (err) err.style.display = 'none';

        const btn = getEl('btn-submit-captcha');
        if (btn) { btn.textContent = "Joining…"; btn.disabled = true; }

        try {
            const snap = await getDocs(query(collection(db, "queue_entries"), where("queueId", "==", activeQueueId)));
            const token = snap.size + 1;
            const ref = await addDoc(collection(db, "queue_entries"), {
                name: myName, queueId: activeQueueId,
                token, status: "waiting", timestamp: serverTimestamp(), pin: null
            });
            const st = JSON.parse(localStorage.getItem('myQueues') || '[]');
            st.push({ docId: ref.id, queueId: activeQueueId, queueName: activeQueueName });
            localStorage.setItem('myQueues', JSON.stringify(st));
            window.location.href = 'my-queues.html';
        } catch (e) {
            console.error(e);
            if (err) { err.textContent = "Failed to join. Try again."; err.style.display = 'block'; }
            if (btn) { btn.textContent = "Join Queue"; btn.disabled = false; }
        }
    };

    // ─────────────────────────────────────────────────
    //  QUEUE LIST (live)
    // ─────────────────────────────────────────────────
    onSnapshot(collection(db, "queues"), snap => {
        const list = getEl('available-queues'); if (!list) return;
        if (snap.empty) {
            list.innerHTML = '<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;font-size:14px;">No active queues yet.</p>';
            return;
        }
        const myActive = JSON.parse(localStorage.getItem('myQueues') || '[]');
        list.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            const joined = myActive.some(q => q.queueId === d.id);
            const card = document.createElement('div');
            card.className = 'glass-card';
            card.innerHTML = `
                <div style="position:relative;z-index:1;">
                    <h3 style="margin:0 0 6px;font-size:18px;font-weight:500;color:white;">${data.name}</h3>
                    <p style="margin:0;font-size:13px;color:var(--text-muted);">${data.businessName}</p>
                </div>
                ${joined
                    ? `<button class="btn" disabled>Already Joined</button>`
                    : `<button class="btn" onclick="window.startJoinProcess('${d.id}','${data.name.replace(/'/g, "\\'")}')">Join Queue</button>`
                }
            `;
            list.appendChild(card);
        });
    });
</script>
</body>
</html>
