<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NoLine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #aaa;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .card {
            padding: 30px 50px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-size: 18px;
            min-width: 200px;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(79, 140, 255, 0.4);
        }

        .customer {
            border-color: rgba(79, 140, 255, 0.4);
        }

        .admin {
            border-color: rgba(255, 69, 58, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>NoLine</h1>
        <p>Select how you want to continue</p>

        <div class="buttons">
            <div class="card customer" onclick="goCustomer()">
                👤 Customer Panel
            </div>

            <div class="card admin" onclick="goAdmin()">
                🛠 Admin Panel
            </div>
        </div>
    </div>

    <script>
        function goCustomer() {
            window.location.href = "login.html";
        }

        function goAdmin() {
            window.location.href = "admin.html";
        }
    </script>

</body>

</html>
